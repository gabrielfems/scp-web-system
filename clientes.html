<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCP – Clientes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pagina-interna">

  <div class="topbar-mobile">
    <button class="btn-hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <span class="topbar-titulo">SCP</span>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="SCP - Sistema de Orçamentos" class="sidebar-logo-img" />
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="sidebar-link">Início</a>
      <a href="clientes.html" class="sidebar-link ativo">Clientes</a>
      <a href="categorias.html" class="sidebar-link">Categorias</a>
      <a href="produtos.html" class="sidebar-link">Produtos</a>
      <a href="orcamentos.html" class="sidebar-link">Orçamentos</a>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-link sidebar-link-sair">Sair</a>
    </div>
  </aside>

  <main class="conteudo-principal">

    <section id="secao-clientes" class="secao">
      <h1>Cadastro de Clientes</h1>

      <form id="formCliente" class="form-cadastro form-linha-unica">

        <div class="form-grupo">
          <label for="tipoCliente" class="form-label-compact">Tipo</label>
          <select id="tipoCliente">
            <option value="">Selecione</option>
            <option value="F">Pessoa Física</option>
            <option value="J">Pessoa Jurídica</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="cpfCnpjCliente" class="form-label-compact">CPF / CNPJ</label>
          <input type="text" id="cpfCnpjCliente" placeholder="Selecione o tipo de cliente" maxlength="18" />
        </div>

        <div class="form-grupo">
          <label for="nomeCliente" class="form-label-compact">Nome</label>
          <input type="text" id="nomeCliente" placeholder="Nome completo ou razão social" maxlength="100" />
        </div>

        <div class="form-acoes">
          <button type="submit" class="btn-primary btn-salvar">Salvar</button>
          <button type="button" id="btnCancelarEdicao" class="btn-secundario elemento-oculto">Cancelar</button>
        </div>

        <p id="mensagemCliente" class="mensagem-erro form-mensagem-linha"></p>

      </form>

      <div class="card-tabela">
        <div class="card-tabela-header">
          <span class="card-tabela-titulo">
            Clientes cadastrados
            <span id="contadorClientes" class="card-tabela-count">0</span>
          </span>
          <div class="busca-wrapper">
            <svg class="busca-icone" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="filtroBusca" placeholder="Buscar por nome ou CPF/CNPJ..." />
          </div>
        </div>
        <table class="tabela-dados" id="tabelaClientes">
          <thead>
            <tr>
              <th>Código</th>
              <th>Tipo</th>
              <th>CPF / CNPJ</th>
              <th>Nome</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaClientes"></tbody>
        </table>
      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/login.js"></script>
  <script src="js/clientes.js"></script>
  <script>
    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const aberta = sidebar.classList.toggle('aberta');
      overlay.classList.toggle('visivel', aberta);
    }
    function fecharSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.remove('aberta');
      overlay.classList.remove('visivel');
    }
  </script>
</body>
</html>
