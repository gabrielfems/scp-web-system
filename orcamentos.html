  <!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCP – Orçamentos</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
</head>
<body class="pagina-interna">

  <div class="topbar-mobile">
    <button class="btn-hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <span class="topbar-titulo">SCP</span>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="SCP - Sistema de Orçamentos" class="sidebar-logo-img" />
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="sidebar-link">Início</a>
      <a href="clientes.html" class="sidebar-link">Clientes</a>
      <a href="categorias.html" class="sidebar-link">Categorias</a>
      <a href="produtos.html" class="sidebar-link">Produtos</a>
      <a href="orcamentos.html" class="sidebar-link ativo">Orçamentos</a>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-link sidebar-link-sair">Sair</a>
    </div>
  </aside>

  <main class="conteudo-principal">

    <section id="secao-orcamentos" class="secao">
      <h1>Orçamentos</h1>

      <div class="orcamento-layout">

        <!-- Coluna esquerda: Dados + Adicionar Item -->
        <div class="orcamento-esquerda">

          <!-- Bloco 1: Dados do Orçamento -->
          <div class="bloco-orcamento">
            <span class="bloco-titulo">Dados do Orçamento</span>

            <div class="form-cadastro">

              <div class="form-linha">
                <div class="form-grupo form-grupo-largo">
                  <label for="clienteOrcamento" class="form-label-compact">Cliente</label>
                  <select id="clienteOrcamento">
                    <option value="">Selecione</option>
                  </select>
                </div>

                <div class="form-grupo">
                  <label class="form-label-compact">Código</label>
                  <input type="text" id="codigoOrcamento" class="input-readonly-display" readonly placeholder="Automático" />
                </div>
              </div>

              <div class="form-linha">
                <div class="form-grupo">
                  <label for="dataOrcamento" class="form-label-compact">Data do Orçamento</label>
                  <input type="text" id="dataOrcamento" placeholder="dd/mm/aaaa" readonly />
                </div>

                <div class="form-grupo">
                  <label for="dataValidade" class="form-label-compact">Data de Validade</label>
                  <input type="text" id="dataValidade" placeholder="dd/mm/aaaa" readonly />
                </div>
              </div>

              <p id="mensagemOrcamento" class="mensagem-erro"></p>

            </div>
          </div>

          <!-- Bloco 2: Adicionar Item -->
          <div class="bloco-orcamento">
            <span class="bloco-titulo">Adicionar Item</span>

            <div class="form-cadastro">

              <div class="form-linha">
                <div class="form-grupo form-grupo-largo">
                  <label for="produtoOrcamento" class="form-label-compact">Produto</label>
                  <select id="produtoOrcamento">
                    <option value="">Selecione um produto</option>
                  </select>
                </div>

                <div class="form-grupo">
                  <label for="quantidadeItem" class="form-label-compact">Quantidade</label>
                  <input type="number" id="quantidadeItem" placeholder="0" min="1" step="1" />
                </div>
              </div>

              <div class="form-linha form-linha-itens">
                <div class="form-grupo form-grupo-largo">
                  <label for="descricaoItemOrc" class="form-label-compact">Descrição</label>
                  <input type="text" id="descricaoItemOrc" class="input-readonly-display" readonly placeholder="—" />
                </div>

                <div class="form-grupo">
                  <label for="valorUnitarioItem" class="form-label-compact">Valor Unitário</label>
                  <input type="text" id="valorUnitarioItem" class="input-readonly-display" readonly placeholder="—" />
                </div>

                <div class="form-grupo">
                  <label for="valorTotalItemOrc" class="form-label-compact">Total do Item</label>
                  <input type="text" id="valorTotalItemOrc" class="input-readonly-display" readonly placeholder="—" />
                </div>
              </div>

              <div class="form-acoes">
                <button type="button" class="btn-primary btn-salvar" onclick="adicionarItem()">Adicionar Item</button>
              </div>

            </div>
          </div>

        </div><!-- /orcamento-esquerda -->

        <!-- Coluna direita: Itens do Orçamento + Lista -->
        <div class="orcamento-direita">

          <span class="bloco-titulo">Itens do Orçamento</span>

          <div class="bloco-orcamento card-itens-orc">

            <div class="card-itens-topo">
              <div class="tabela-wrapper">
                <table class="tabela-dados tabela-itens-orc">
                  <thead>
                    <tr>
                      <th>Produto</th>
                      <th>Descrição</th>
                      <th>Qtd</th>
                      <th>Valor Unitário</th>
                      <th>Valor Total</th>
                      <th>Ações</th>
                    </tr>
                  </thead>
                  <tbody id="corpoTabelaItens"></tbody>
                </table>
              </div>
            </div>

            <div class="card-itens-rodape">
              <div class="total-orcamento">
                <span class="tfoot-label">Valor Total do Orçamento</span>
                <span id="valorTotalOrcamento" class="tfoot-total">R$ 0,00</span>
              </div>
              <div class="form-acoes orcamento-acoes-salvar">
                <button type="button" class="btn-secundario btn-salvar" onclick="toggleListaOrcamentos()">Exibir Orçamentos</button>
                <button type="button" class="btn-primary btn-salvar" onclick="salvarOrcamento()">Salvar Orçamento</button>
              </div>
            </div>

          </div>

        </div><!-- /orcamento-direita -->

      </div><!-- /orcamento-layout -->

      <div id="secaoListaOrcamentos" style="display:none; margin-top:24px;">
        <div style="background:#fff; border-radius:6px; padding:0;">
          <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px 12px;">
            <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:#888;">Orçamentos Salvos</span>
          </div>
          <table class="tabela-dados tabela-lista-orc" id="tabelaListaOrcamentos">
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Data</th>
                <th>Validade</th>
                <th>Valor Total</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="corpoListaOrcamentos">
              <tr><td colspan="6" class="tabela-vazia">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="js/login.js"></script>
  <script src="js/orcamentos.js"></script>
  <script>
    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const aberta = sidebar.classList.toggle('aberta');
      overlay.classList.toggle('visivel', aberta);
    }
    function fecharSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.remove('aberta');
      overlay.classList.remove('visivel');
    }
  </script>
</body>
</html>
