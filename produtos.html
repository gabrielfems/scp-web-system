<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCP – Produtos</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
</head>
<body class="pagina-interna">

  <div class="topbar-mobile">
    <button class="btn-hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <span class="topbar-titulo">SCP</span>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="SCP - Sistema de Orçamentos" class="sidebar-logo-img" />
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="sidebar-link">Início</a>
      <a href="clientes.html" class="sidebar-link">Clientes</a>
      <a href="categorias.html" class="sidebar-link">Categorias</a>
      <a href="produtos.html" class="sidebar-link ativo">Produtos</a>
      <a href="orcamentos.html" class="sidebar-link">Orçamentos</a>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-link sidebar-link-sair">Sair</a>
    </div>
  </aside>

  <main class="conteudo-principal">

    <section id="secao-produtos" class="secao">
      <h1>Produtos</h1>

      <form id="formProduto" class="form-cadastro">

        <div class="form-linha">
          <div class="form-grupo form-grupo-largo">
            <label for="categoriaProduto">Categoria</label>
            <select id="categoriaProduto">
              <option value="">Selecione</option>
            </select>
          </div>

          <div class="form-grupo">
            <label for="statusProduto">Status</label>
            <select id="statusProduto">
              <option value="">Selecione</option>
              <option value="A">Ativo</option>
              <option value="I">Inativo</option>
            </select>
          </div>
        </div>

        <div class="form-linha">
          <div class="form-grupo form-grupo-largo">
            <label for="descricaoProduto">Descrição</label>
            <input type="text" id="descricaoProduto" placeholder="Descrição do produto" maxlength="100" />
          </div>

          <div class="form-grupo">
            <label for="valorVenda">Valor de Venda (R$)</label>
            <input type="number" id="valorVenda" placeholder="0,00" min="0" step="0.01" />
          </div>
        </div>

        <div class="form-linha">
          <div class="form-grupo form-grupo-largo">
            <label for="observacaoProduto">Observação</label>
            <input type="text" id="observacaoProduto" placeholder="Observação (opcional)" maxlength="200" />
          </div>

          <div class="form-grupo">
            <label for="dataCadastroProduto">Data de Cadastro</label>
            <input type="text" id="dataCadastroProduto" placeholder="dd/mm/aaaa" readonly />
          </div>
        </div>

        <p id="mensagemProduto" class="mensagem-erro"></p>

        <div class="form-acoes">
          <button type="submit" id="btnSalvarProduto" class="btn-primary btn-salvar">Salvar</button>
          <button type="button" id="btnCancelarProduto" class="btn-secundario elemento-oculto" onclick="cancelarEdicaoProduto()">Cancelar</button>
        </div>

      </form>

      <div class="tabela-wrapper">
        <table class="tabela-dados" id="tabelaProdutos">
          <thead>
            <tr>
              <th>Código</th>
              <th>Categoria</th>
              <th>Descrição</th>
              <th>Valor</th>
              <th>Data</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaProdutos"></tbody>
        </table>
      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="js/login.js"></script>
  <script src="js/produtos.js"></script>
  <script>
    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const aberta = sidebar.classList.toggle('aberta');
      overlay.classList.toggle('visivel', aberta);
    }
    function fecharSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.remove('aberta');
      overlay.classList.remove('visivel');
    }
  </script>
</body>
</html>
