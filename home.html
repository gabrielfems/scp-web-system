<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCP</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pagina-interna">

  <div class="topbar-mobile">
    <button class="btn-hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <span class="topbar-titulo">SCP</span>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="SCP - Sistema de Orçamentos" class="sidebar-logo-img" />
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="sidebar-link ativo">Início</a>
      <a href="clientes.html" class="sidebar-link">Clientes</a>
      <a href="categorias.html" class="sidebar-link">Categorias</a>
      <a href="produtos.html" class="sidebar-link">Produtos</a>
      <a href="orcamentos.html" class="sidebar-link">Orçamentos</a>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-link sidebar-link-sair">Sair</a>
    </div>
  </aside>

  <main class="conteudo-principal">

    <section id="secao-inicio" class="secao">
      <h1>Dashboard</h1>

      <div class="dashboard-cards">

        <div class="dashboard-card card-vigentes">
          <div class="card-header">
            <span class="card-titulo">Orçamentos Vigentes</span>
            <div class="card-icone">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
          </div>
          <span class="card-valor" id="cardVigentes">—</span>
        </div>

        <div class="dashboard-card card-expirados">
          <div class="card-header">
            <span class="card-titulo">Orçamentos Expirados</span>
            <div class="card-icone">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
          </div>
          <span class="card-valor" id="cardExpirados">—</span>
        </div>

        <div class="dashboard-card card-clientes">
          <div class="card-header">
            <span class="card-titulo">Total de Clientes</span>
            <div class="card-icone">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
          </div>
          <span class="card-valor" id="cardClientes">—</span>
        </div>

        <div class="dashboard-card card-ticket">
          <div class="card-header">
            <span class="card-titulo">Ticket Médio</span>
            <div class="card-icone">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
            </div>
          </div>
          <span class="card-valor" id="cardTicket">—</span>
        </div>

      </div>

      <div class="dashboard-recentes">
        <h2 class="bloco-titulo">Orçamentos Recentes</h2>
        <div class="tabela-wrapper">
          <table class="tabela-dados" id="tabelaOrcamentosRecentes">
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Data</th>
                <th>Validade</th>
                <th>Valor Total</th>
              </tr>
            </thead>
            <tbody id="corpoOrcamentosRecentes">
              <tr><td colspan="5" class="tabela-vazia">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="dashboard-produtos">

        <div class="produto-card produto-card-ativos">
          <button class="produto-card-cabecalho" type="button" onclick="toggleProdutoCard('ativos')">
            <div class="produto-card-titulo">
              <span>Produtos Ativos</span>
              <span class="produto-card-count" id="countAtivos">—</span>
            </div>
            <span class="produto-card-seta" id="setaAtivos">&#9660;</span>
          </button>
          <div class="produto-card-corpo" id="corpoAtivos">
            <div class="produto-card-inner" id="innerAtivos"></div>
          </div>
        </div>

        <div class="produto-card produto-card-inativos">
          <button class="produto-card-cabecalho" type="button" onclick="toggleProdutoCard('inativos')">
            <div class="produto-card-titulo">
              <span>Produtos Inativos</span>
              <span class="produto-card-count" id="countInativos">—</span>
            </div>
            <span class="produto-card-seta" id="setaInativos">&#9660;</span>
          </button>
          <div class="produto-card-corpo" id="corpoInativos">
            <div class="produto-card-inner" id="innerInativos"></div>
          </div>
        </div>

      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/login.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
