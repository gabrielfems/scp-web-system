<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h2>Login</h2>

      <div class="form-group">
        <input type="text" id="usuario" placeholder="Insira seu usuário" />
      </div>

      <div class="form-group password-group">
        <input type="password" id="senha" placeholder="Senha" />
        <button type="button" class="toggle-password" onclick="toggleSenha()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <p id="mensagemLogin" class="mensagem-erro"></p>

      <button class="btn-primary" onclick="fazerLogin()">Acessar conta</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/login.js"></script>
</body>
</html>
