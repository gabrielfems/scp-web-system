<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-ribbon"></div>

    <div class="login-row">
      <!-- Cartão imagem -->
      <div class="login-image-card">
        <img src="assets/loja-brasil.png" alt="Atendente e cliente na loja" />
      </div>

      <!-- Cartão login -->
      <div class="login-card">
        <h1>Login</h1>

        <div class="login-form-group">
          <label>Usuário <span class="campo-obrigatorio">*</span></label>
          <div class="input-icon-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="usuario"
              placeholder="Insira seu usuário"
            />
          </div>
        </div>

        <div class="login-form-group">
          <label>Senha <span class="campo-obrigatorio">*</span></label>
          <div class="password-group">
            <input type="password" id="senha" />
            <button type="button" class="toggle-password" onclick="toggleSenha()">
              <svg id="icone-olho-aberto" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="icone-olho-fechado" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="login-esqueceu">
          <a href="#">Esqueceu sua senha?</a>
        </div>

        <p id="mensagemLogin" class="mensagem-erro"></p>

        <button class="btn-primary" onclick="fazerLogin()">Entrar</button>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/login.js"></script>
</body>
</html>
