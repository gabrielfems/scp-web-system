<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCP – Categorias</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pagina-interna">

  <div class="topbar-mobile">
    <button class="btn-hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <span class="topbar-titulo">SCP</span>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo.png" alt="SCP - Sistema de Orçamentos" class="sidebar-logo-img" />
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="sidebar-link">Início</a>
      <a href="clientes.html" class="sidebar-link">Clientes</a>
      <a href="categorias.html" class="sidebar-link ativo">Categorias</a>
      <a href="produtos.html" class="sidebar-link">Produtos</a>
      <a href="orcamentos.html" class="sidebar-link">Orçamentos</a>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-link sidebar-link-sair">Sair</a>
    </div>
  </aside>

  <main class="conteudo-principal">

    <section id="secao-categorias" class="secao">
      <h1>Categorias</h1>

      <form id="formCategoria" class="form-cadastro form-linha-unica" style="grid-template-columns: 160px 1fr auto;">

        <div class="form-grupo">
          <label for="idCategoria" class="form-label-compact">Código</label>
          <input type="number" id="idCategoria" placeholder="Código" min="1" />
        </div>

        <div class="form-grupo">
          <label for="descricaoCategoria" class="form-label-compact">Descrição</label>
          <input type="text" id="descricaoCategoria" placeholder="Descrição da categoria" maxlength="50" />
        </div>

        <div class="form-acoes">
          <button type="submit" class="btn-primary btn-salvar">Salvar</button>
          <button type="button" id="btnCancelarCategoriaEdicao" class="btn-secundario elemento-oculto">Cancelar</button>
        </div>

        <p id="mensagemCategoria" class="mensagem-erro form-mensagem-linha"></p>

      </form>

      <div class="card-tabela">
        <div class="card-tabela-header">
          <span class="card-tabela-titulo">
            Categorias cadastradas
            <span id="contadorCategorias" class="card-tabela-count">0</span>
          </span>
          <div class="busca-wrapper">
            <svg class="busca-icone" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="filtroCategoriaBusca" placeholder="Buscar por código ou descrição..." />
          </div>
        </div>
        <div class="tabela-wrapper">
          <table class="tabela-dados" id="tabelaCategorias">
            <thead>
              <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="corpoTabelaCategorias"></tbody>
          </table>
        </div>
      </div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/login.js"></script>
  <script src="js/categorias.js"></script>
  <script>
    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const aberta = sidebar.classList.toggle('aberta');
      overlay.classList.toggle('visivel', aberta);
    }
    function fecharSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.remove('aberta');
      overlay.classList.remove('visivel');
    }
  </script>
</body>
</html>
